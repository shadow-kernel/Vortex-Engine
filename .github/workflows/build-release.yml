name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  SOLUTION_FILE: Editor.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Determine version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "push") {
          $version = "${{ github.ref_name }}".TrimStart('v')
        } else {
          $version = "${{ github.event.inputs.version }}"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    - name: Setup Visual Studio Developer Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Restore NuGet packages
      run: nuget restore ${{ env.SOLUTION_FILE }}
    
    - name: Update version in Installer script
      shell: pwsh
      run: |
        $issFile = "Installer/VortexEngine.iss"
        $content = Get-Content $issFile -Raw
        $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"${{ steps.version.outputs.VERSION }}`""
        Set-Content $issFile $content
    
    - name: Build C++ Engine (x64)
      run: msbuild Engine/Engine.vcxproj /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=x64 /m
    
    - name: Build Editor Application
      run: msbuild Editor/Editor.csproj /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=AnyCPU /m
    
    - name: Download Inno Setup
      shell: pwsh
      run: |
        $innoUrl = "https://jrsoftware.org/download.php/is.exe"
        $innoInstaller = "$env:TEMP\innosetup.exe"
        Invoke-WebRequest -Uri $innoUrl -OutFile $innoInstaller
        Start-Process -FilePath $innoInstaller -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait
    
    - name: Create Installer output directory
      run: New-Item -ItemType Directory -Force -Path "Installer/Output"
    
    - name: Build Installer
      shell: pwsh
      run: |
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (Test-Path $iscc) {
          & $iscc "Installer/VortexEngine.iss"
        } else {
          Write-Error "Inno Setup not found at: $iscc"
          exit 1
        }
    
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VortexEngine-Installer-${{ steps.version.outputs.VERSION }}
        path: Installer/Output/*.exe
        retention-days: 30
    
    - name: Upload Portable Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VortexEngine-Portable-${{ steps.version.outputs.VERSION }}
        path: |
          x64/Release/*.exe
          x64/Release/*.dll
          x64/Release/*.config
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: write
    
    steps:
    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          version="${{ github.ref_name }}"
          version="${version#v}"
        else
          version="${{ github.event.inputs.version }}"
        fi
        echo "VERSION=$version" >> $GITHUB_OUTPUT
    
    - name: Download Installer Artifact
      uses: actions/download-artifact@v4
      with:
        name: VortexEngine-Installer-${{ steps.version.outputs.VERSION }}
        path: ./installer
    
    - name: Download Portable Artifact
      uses: actions/download-artifact@v4
      with:
        name: VortexEngine-Portable-${{ steps.version.outputs.VERSION }}
        path: ./portable
    
    - name: Create Portable ZIP
      run: |
        cd portable
        zip -r ../VortexEngine-Portable-${{ steps.version.outputs.VERSION }}.zip .
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Vortex Engine v${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          installer/*.exe
          VortexEngine-Portable-${{ steps.version.outputs.VERSION }}.zip
        body: |
          ## Vortex Engine v${{ steps.version.outputs.VERSION }}
          
          ### Installation
          
          **Installer (Recommended):**
          Download and run `VortexEngine-Setup-${{ steps.version.outputs.VERSION }}.exe`
          
          **Portable Version:**
          Download `VortexEngine-Portable-${{ steps.version.outputs.VERSION }}.zip` and extract to any folder.
          
          ### System Requirements
          - Windows 10 or later (64-bit)
          - .NET Framework 4.8
          - DirectX 11 compatible graphics card
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
