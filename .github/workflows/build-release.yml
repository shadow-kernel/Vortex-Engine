name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  SOLUTION_FILE: Vortex.slnx
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Streamline (headers, needed to COMPILE DX12Streamline.cpp) + the 3D Starter template live in
        # submodules. Without this the build fails (missing sl.h) and the installer ships no templates.
        submodules: recursive
    
    - name: Determine version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "push") {
          $version = "${{ github.ref_name }}".TrimStart('v')
        } else {
          $version = "${{ github.event.inputs.version }}"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    - name: Setup Visual Studio Developer Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Restore NuGet packages (packages.config)
      run: |
        nuget restore Engine/packages.config -SolutionDirectory .
        nuget restore VortexAPI/packages.config -SolutionDirectory .
        nuget restore Editor/packages.config -SolutionDirectory .
    
    - name: Update version in Installer script
      shell: pwsh
      run: |
        $issFile = "Installer/VortexEngine.iss"
        $content = Get-Content $issFile -Raw
        $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"${{ steps.version.outputs.VERSION }}`""
        Set-Content $issFile $content
    
    # Builds the whole solution in dependency order (Engine.lib -> VortexAPI.dll -> Vortex Engine.exe).
    # PlatformToolset is overridden to v143 because the GitHub windows-latest runner ships VS2022.
    # On a machine with VS2026 (v145) installed, build without the override (the projects pin v145).
    - name: Build full solution (Engine -> VortexAPI.dll -> Editor)
      run: msbuild ${{ env.SOLUTION_FILE }} /t:Rebuild /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=${{ env.BUILD_PLATFORM }} /p:PlatformToolset=v143 /m

    - name: Verify native engine + editor artifacts are co-located
      shell: pwsh
      run: |
        $out = "x64/${{ env.BUILD_CONFIGURATION }}"
        $required = @("Vortex Engine.exe", "VortexAPI.dll", "assimp-vc143-mt.dll")
        $missing = $required | Where-Object { -not (Test-Path "$out/$_") }
        if ($missing) { Write-Error "Missing required artifacts in $out : $($missing -join ', ')"; exit 1 }
        Write-Host "OK: $($required -join ', ') present in $out"
    
    - name: Download Inno Setup
      shell: pwsh
      run: |
        $innoUrl = "https://jrsoftware.org/download.php/is.exe"
        $innoInstaller = "$env:TEMP\innosetup.exe"
        Invoke-WebRequest -Uri $innoUrl -OutFile $innoInstaller
        Start-Process -FilePath $innoInstaller -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait
    
    - name: Create Installer output directory
      run: New-Item -ItemType Directory -Force -Path "Installer/Output"
    
    - name: Build Installer
      shell: pwsh
      run: |
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (Test-Path $iscc) {
          & $iscc "Installer/VortexEngine.iss"
        } else {
          Write-Error "Inno Setup not found at: $iscc"
          exit 1
        }
    
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VortexEngine-Installer-${{ steps.version.outputs.VERSION }}
        path: Installer/Output/*.exe
        retention-days: 30
    
    - name: Upload Portable Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VortexEngine-Portable-${{ steps.version.outputs.VERSION }}
        path: |
          x64/Release/*.exe
          x64/Release/*.dll
          x64/Release/*.config
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: write
    
    steps:
    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          version="${{ github.ref_name }}"
          version="${version#v}"
        else
          version="${{ github.event.inputs.version }}"
        fi
        echo "VERSION=$version" >> $GITHUB_OUTPUT
    
    - name: Download Installer Artifact
      uses: actions/download-artifact@v4
      with:
        name: VortexEngine-Installer-${{ steps.version.outputs.VERSION }}
        path: ./installer
    
    - name: Download Portable Artifact
      uses: actions/download-artifact@v4
      with:
        name: VortexEngine-Portable-${{ steps.version.outputs.VERSION }}
        path: ./portable
    
    - name: Create Portable ZIP
      run: |
        cd portable
        zip -r ../VortexEngine-Portable-${{ steps.version.outputs.VERSION }}.zip .
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Vortex Engine v${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          installer/*.exe
          VortexEngine-Portable-${{ steps.version.outputs.VERSION }}.zip
        body: |
          ## Vortex Engine v${{ steps.version.outputs.VERSION }}
          
          ### Installation
          
          **Installer (Recommended):**
          Download and run `VortexEngine-Setup-${{ steps.version.outputs.VERSION }}.exe`
          
          **Portable Version:**
          Download `VortexEngine-Portable-${{ steps.version.outputs.VERSION }}.zip` and extract to any folder.
          
          ### System Requirements
          - Windows 10 or later (64-bit)
          - .NET Framework 4.8
          - DirectX 11 compatible graphics card
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
